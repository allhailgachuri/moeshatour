<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <header>
        <h1>Our Gallery</h1>
        <p>Pictures from our travelers</p>
    </header>
    
    <section class="gallery-grid">
        <div class="gallery-item">
            <img src="/images/dubai.jpeg" alt="Palm Trees">
        </div>
        <div class="gallery-item wide">
            <img src="../public/beach.jpg" alt="Beach Chairs">
        </div>
        <div class="gallery-item">
            <img src="image3.jpg" alt="Reading by the Water">
        </div>
        <div class="gallery-item">
            <img src="image4.jpg" alt="View from a Car Window">
        </div>
        <div class="gallery-item wide">
            <img src="image5.jpg" alt="Beach Landscape">
        </div>
        <div class="gallery-item">
            <img src="image6.jpg" alt="Person Reading by the Water">
        </div>
        <div class="gallery-item">
            <img src="../public/beach1.jpg" alt="Beach from a Car">
        </div>
        <!-- Add more images as needed -->
    </section>

    <button class="back-btn"onclick="history.back()">Back</button>

    <script src="gallery.js"></script>
</body>
</html>
