<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now Form</title>
    <link rel="stylesheet" href="book.css">
    <script src="script.js" defer></script>
    <script src="options.js" defer></script> <!-- Load options.js -->
    <style>
        /* Add some basic styling to make the form look decent */
        .hidden {
            display: none;
        }
        /* Add more styles as needed */
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <a href="../index.html#hero">
                <img src="../images/logo.png" alt="Travel Logo" class="logo-image">
            </a>
        </div>
        <ul class="nav-links" id="nav">
            <li><a href="#hero">Home</a></li>
            <li><a href="/about us/about.html">About Us</a></li>
            <li><a href="/destination/des.html">Destinations</a></li>
            <li><a href="/rides/rides.html">Car Hire</a></li>
            <li><a href="/missions/missions.html">Missionary work</a></li>
        </ul>
    </nav>

    <form id="inquiryForm" onsubmit="showCardDetails(event)">
        <label>
            Name:
            <input type="text" name="name" required>
        </label>
        <label>
            Email:
            <input type="email" name="email" required>
        </label>
        <label>
            Inquiry about:
            <select id="inquirySelect">
                <option value="">Select...</option>
                <!-- Options will be populated by options.js -->
            </select>
        </label>
        <div id="details" class="hidden"></div>
        <label>
            Description of inquiry:
            <textarea name="message" required></textarea>
        </label>
        <button type="submit">Send</button>
    </form>

    <div id="cardDetailsForm" class="hidden">
        <h3>Card Details</h3>
        <form id="paymentForm">
            <label>
                Card Number:
                <input type="text" name="cardNumber" required>
            </label>
            <label>
                Expiration Date:
                <input type="text" name="expirationDate" required>
            </label>
            <label>
                CVV:
                <input type="text" name="cvv" required>
            </label>
            <button type="submit">Pay</button>
        </form>
    </div>

    <footer class="footer-section">
        <div class="footer-container">
            <div class="footer-column">
                <a href="#hero" style="text-decoration: none;">
                    <h3>TRAVEL</h3>
                </a>
                <p>Your fulfillment is our pride.</p>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </div>

            <div class="footer-column">
                <h4>CONTACT US</h4>
                <ul>
                    <li><a href="mailto:INFO@SAFARIMARKETAFRICA.COM">info@safarimarketafrica.com</a></li>
                    <li>+254722519360</li>
                    <li>+25436519360</li>
                    <li>View Park Towers 14th floor</li>
                    <li>Utalii Lane</li>
                </ul>
            </div>
        </div>
    </footer>
</body>
</html>
